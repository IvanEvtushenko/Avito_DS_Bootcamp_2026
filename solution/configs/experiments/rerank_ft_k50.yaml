# Свежее дообучение bge-reranker на 5 фолдах dev-400, candidate_top_k=50.
# Всё как rerank_ft_k30.yaml, кроме top_k: R@50≈0.984 (выше потолок, но больше и
# сложнее негативов при обучении). Что победит — решает dev-400 OOF (refit_sweep.py).
#   PYTHONPATH=src HF_HUB_OFFLINE=1 python3 -m support_search.cli all --experiment rerank_ft_k50.yaml
artifacts_dir: artifacts_rr_ft_k50
fusion:
  candidate_top_k: 50           # R@50≈0.984 — выше потолок реранкера
evaluation:
  recall_ks: [10, 20, 50, 100]
reranker:
  enabled: true
  backend: sequence_classification
  model_name: BAAI/bge-reranker-v2-m3
  revision: 953dc6f6f85a1b2dbfca4c34a2796e7dde08d41e
  max_length: 512
  batch_size: 64
  use_fp16: true
  candidate_top_k: 50           # реранкер переоценивает весь топ-50 fusion
  chunks_per_article: 3         # как в валидированном протоколе (изоляция top_k)
  fine_tune:
    enabled: true
    data: labeled
    reuse_models: null          # СВЕЖЕЕ обучение
    epochs: 2
    lr: 1.0e-5
    schedule: cosine
    warmup_ratio: 0.1
    batch_groups: 4
    n_negatives: 7
    max_length: 384
    freeze_embeddings: true
ranking:
  method: lr
  graph_features:
    enabled: true
    top_m: 3
    interaction: true
    co_weight: cond
  mlp:
    enabled: false
