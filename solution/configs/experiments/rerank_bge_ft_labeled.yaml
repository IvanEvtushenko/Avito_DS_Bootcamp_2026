# FT-сценарий 1: дообучение bge-reranker-v2-m3 на РАЗМЕЧЕННЫХ данных (500 калибровочных).
# Честный OOF по 5 фолдам. Новое против rerank_bge_ft.yaml: warmup+cosine (lr 1e-5,
# warmup_ratio 0.1 — стандарт FlagEmbedding), 2 эпохи, топ-3 чанков со скором max
# (идея №3 MAP_IMPROVEMENT_IDEAS). Веса — только в этом artifacts_dir.
#   cd solution && PYTHONPATH=src HF_HUB_OFFLINE=1 python3 -m support_search.cli all --experiment rerank_bge_ft_labeled.yaml
artifacts_dir: artifacts_rr_bge_ft_labeled
fusion:
  candidate_top_k: 50           # потолок кандидатов: R@50≈0.975 vs R@30≈0.958 — реранкеру есть кого поднимать
evaluation:
  recall_ks: [10, 20, 50, 100]
reranker:
  enabled: true
  backend: sequence_classification
  model_name: BAAI/bge-reranker-v2-m3
  revision: 953dc6f6f85a1b2dbfca4c34a2796e7dde08d41e
  max_length: 512
  batch_size: 64
  use_fp16: true
  candidate_top_k: 50           # реранкер переоценивает весь топ-50 fusion
  chunks_per_article: 40        # все чанки (max-pool). Архивный прогон 2026-07-18 шёл с 3
                                # (см. PROVENANCE/config_used.yaml); перепрогон пересчитает кэш
  fine_tune:
    enabled: true
    data: labeled               # 500 размеченных, 5 фолдов (честный OOF)
    epochs: 2
    lr: 1.0e-5
    schedule: cosine            # linear warmup → косинусное затухание
    warmup_ratio: 0.1
    batch_groups: 4
    n_negatives: 7
    max_length: 384
    freeze_embeddings: true     # обязательный фикс памяти для 12 ГБ
