# Свежее дообучение bge-reranker на 5 фолдах dev-400, candidate_top_k=30.
# Отличие от 0.7484-базы: обучение консистентно лемме (свежие негативы из
# лемматизированного fusion), а не переиспользование не-лемма-весов. Гиперпараметры
# FT — валидированные (дали OOF 0.707): cosine+warmup 0.1, lr 1e-5, 2 эпохи,
# 7 негативов, freeze_embeddings, chunks=3. Голова blend — финальная: lr + граф-фичи
# (co_weight=cond). Свип top_k/epochs гоняет refit_sweep.py.
#   PYTHONPATH=src HF_HUB_OFFLINE=1 python3 -m support_search.cli all --experiment rerank_ft_k30.yaml
artifacts_dir: artifacts_rr_ft_k30
fusion:
  candidate_top_k: 30           # R@30≈0.958 — потолок для реранкера
evaluation:
  recall_ks: [10, 20, 50, 100]
reranker:
  enabled: true
  backend: sequence_classification
  model_name: BAAI/bge-reranker-v2-m3
  revision: 953dc6f6f85a1b2dbfca4c34a2796e7dde08d41e
  max_length: 512
  batch_size: 64
  use_fp16: true
  candidate_top_k: 30           # реранкер переоценивает весь топ-30 fusion
  chunks_per_article: 3         # как в валидированном протоколе (изоляция top_k)
  fine_tune:
    enabled: true
    data: labeled               # 500 размеченных, 5 фолдов (честный OOF на dev-400)
    reuse_models: null          # СВЕЖЕЕ обучение (не переиспользуем ночные веса)
    epochs: 2
    lr: 1.0e-5
    schedule: cosine
    warmup_ratio: 0.1
    batch_groups: 4
    n_negatives: 7
    max_length: 384
    freeze_embeddings: true
ranking:
  method: lr
  graph_features:
    enabled: true
    top_m: 3
    interaction: true
    co_weight: cond
  mlp:
    enabled: false
