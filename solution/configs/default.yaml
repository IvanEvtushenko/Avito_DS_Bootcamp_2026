# Полный конфиг решения, разбитый по секциям (план §5.1). Компоненты получают
# только свою секцию — случайное изменение чужого параметра не инвалидирует все
# кэши. Ablation-конфиги в configs/experiments/ переопределяют отдельные ключи.

seed: 42

data:
  dir: ../candidate_data        # относительно корня проекта (solution/)
  articles: articles.f
  calibration: calibration.f
  test: test.f

preprocess:
  html:
    # Теги, у которых нет полезного для поиска текста; остальное (таблицы,
    # спойлеры/вкладки=label, списки, анкоры ссылок) сохраняется.
    drop_tags: [script, style, input, img, svg, button]
  normalize:
    lemmatizer: auto            # auto | pymorphy3 | none  (auto = pymorphy3 если установлен)
    tokenizer: auto             # auto | razdel | regex
    min_len: 2
    use_stopwords: true
    # Плейсхолдеры есть только в запросах, в статьях их нет (EDA). Значение =
    # слово-замена для лексического сигнала; "" = выбросить токен. Это дешёвая
    # ablation-развилка (план §6, этап 2).
    placeholders:
      "<MONEY>": деньги
      "<DATE>": дата
      "<PHONE>": телефон
      "<URL>": ссылка
      "<ID>": ""
  chunking:
    max_tokens: 400
    overlap: 100
    max_chunks_per_article: 40  # защита от статьи на 901К символов (план §8)
    title_prefix: true

folds:
  n_splits: 5
  holdout_frac: 0.2
  stratify_by: gt_count         # число GT-статей: 1 / 2 / 3+
  seed: 42

retrievers:
  document_field: full          # full | chunks — представление статьи для лексики
  bm25:
    enabled: true
    k1: 1.5
    b: 0.75
    title_weight: 2.0           # BM25F-lite: вес поля title (дешёвый параметр §4.3)
  char_tfidf:
    enabled: true
    ngram_min: 3
    ngram_max: 5
    min_df: 2
    sublinear_tf: true
    title_weight: 2.0
  dense:                        # bi-encoder (этап 4). Чанкинг берётся из preprocess.chunking.
    # Выбран сравнением эмбеддеров (см. README_EMB.md): BAAI/bge-m3 —
    # fusion OOF MAP@10 0.501 против 0.484 у e5-large (прирост не значим по CI,
    # p≈0.18, но стабилен). Альтернативы — configs/experiments/emb_*.yaml.
    enabled: true
    model_name: BAAI/bge-m3
    device: null                # null → cuda, если доступна, иначе cpu
    max_seq_len: 512
    batch_size: 64
    use_fp16: true
    w_title: 0.5                # вклад косинуса заголовка (дешёвый параметр §4.3)
    query_prefix: ""            # bge-семейство: без префиксов
    passage_prefix: ""
    pooling: cls                # mean (e5) | cls (BGE-семейство)
    model_class: auto           # auto (XLM-R) | t5_encoder (FRIDA)

fusion:                         # слияние кандидатов (этап 5)
  enabled: true
  # Слияние — для ОТБОРА кандидатов, поэтому подбор весов по сетке максимизирует
  # recall@candidate_top_k (tie MAP@k), а не MAP. Упорядочивание — дело реранкера
  # и mini-LTR ниже. lr — альтернатива (ablation).
  method: weighted_sum          # weighted_sum (дефолт) | lr | rrf
  sources: null                 # null → все включённые ретриверы
  rrf_k: 40                     # k для RRF-альтернативы
  candidate_top_k: 30           # сколько кандидатов сохранять (потолок для реранкера)
  random_search:
    n_samples: 500              # сэмплов весов для method=weighted_sum (ablation, §4.3)
  ltr:                          # параметры LR-слияния
    l2: 1.0                     # сила L2-регуляризации
    use_ranks: true             # добавлять обратные ранги источников как признаки

reranker:                       # cross-encoder reranker (этап 6)
  enabled: true
  model_name: BAAI/bge-reranker-v2-m3
  device: null                  # null → cuda, если доступна
  max_length: 512
  batch_size: 64
  use_fp16: true
  candidate_top_k: 30           # сколько кандидатов fusion переоценивать
  fine_tune:                    # zero-shot по умолчанию; FT сравнивается по OOF (§6, фолбэк)
    enabled: false
    epochs: 2
    lr: 2.0e-5
    batch_groups: 4
    n_negatives: 7
    max_length: 384

ranking:                        # финальное ранжирование (этап 7)
  method: lr                    # lr (mini-LTR §7.2, дефолт) | blend (ручной вес)
  weight_grid: 51               # размер сетки поиска веса для method=blend (ablation)
  ltr:                          # параметры mini-LTR
    l2: 1.0
    use_ranks: true

evaluation:
  k: 10                         # MAP@k
  recall_ks: [10, 20, 30, 100]
  bootstrap_resamples: 10000
  ci: 0.95

export:
  top_k: 10
  # Какая матрица скоров формирует answer.csv. С этапа 7 — финальный блэнд.
  primary_source: blend
