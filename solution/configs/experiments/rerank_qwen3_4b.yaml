# Ablation §6: реранкер Qwen/Qwen3-Reranker-4B (instruction-aware, causal-LM yes/no).
# Тот же yes/no протокол, что и 0.6B, но крупнее. batch_size=1 из-за 12 ГБ VRAM
# (веса ~7.6 ГБ, инференс в fp16). Retrieval-стек — как в default. Revision закреплён.
#   cd solution && HF_HUB_OFFLINE=1 python3 -m support_search.cli all --experiment rerank_qwen3_4b.yaml
artifacts_dir: artifacts_rr_qwen3_4b
reranker:
  enabled: true
  backend: qwen3_causal_lm
  model_name: Qwen/Qwen3-Reranker-4B
  revision: 22e683669bc0f0bd69640a1354a6d0aebcfeede5
  instruction: >-
    Given a Russian customer support query, rank help-center passages by how
    directly and completely they answer the user's issue. Multiple passages
    may be relevant.
  max_length: 512
  batch_size: 1
  use_fp16: true
  candidate_top_k: 50           # общий для всех rerank_*
  fine_tune:
    enabled: false
