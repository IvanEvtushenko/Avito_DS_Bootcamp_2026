# Holdout-обращение №1: ИСХОДНАЯ модель (zero-shot BAAI/bge-reranker-v2-m3),
# полный пайплайн под текущим протоколом: fusion top-50, chunks_per_article=40
# (наследуется из default), FT выключен. После прогона holdout оценивается
# скриптом holdout_check.py zs (по матрицам ЭТОГО прогона).
#   cd solution && PYTHONPATH=src HF_HUB_OFFLINE=1 python3 -m support_search.cli all --experiment rerank_bge_zs_c40.yaml
artifacts_dir: artifacts_rr_bge_zs_c40
fusion:
  candidate_top_k: 50
evaluation:
  recall_ks: [10, 20, 50, 100]
reranker:
  enabled: true
  backend: sequence_classification
  model_name: BAAI/bge-reranker-v2-m3
  revision: 953dc6f6f85a1b2dbfca4c34a2796e7dde08d41e
  max_length: 512
  batch_size: 64
  use_fp16: true
  candidate_top_k: 50
  fine_tune:
    enabled: false
